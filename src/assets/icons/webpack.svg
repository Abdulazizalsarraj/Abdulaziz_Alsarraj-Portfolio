<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="wp-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8DD6F9"/>
      <stop offset="100%" stop-color="#1C78C0"/>
    </linearGradient>
  </defs>
  <!-- Webpack cube logo -->
  <!-- Top face -->
  <polygon points="32,4 56,17 32,30 8,17" fill="#8DD6F9"/>
  <!-- Left face -->
  <polygon points="8,17 8,47 32,60 32,30" fill="#1C78C0"/>
  <!-- Right face -->
  <polygon points="56,17 56,47 32,60 32,30" fill="url(#wp-blue)"/>
  <!-- Inner lines on top face -->
  <line x1="32" y1="4" x2="32" y2="30" stroke="white" stroke-width="1" opacity="0.4"/>
  <line x1="8" y1="17" x2="56" y2="17" stroke="white" stroke-width="1" opacity="0.3"/>
  <!-- Vertical edge lines -->
  <line x1="8" y1="17" x2="8" y2="47" stroke="white" stroke-width="0.8" opacity="0.3"/>
  <line x1="56" y1="17" x2="56" y2="47" stroke="white" stroke-width="0.8" opacity="0.3"/>
  <line x1="32" y1="30" x2="32" y2="60" stroke="white" stroke-width="0.8" opacity="0.3"/>
</svg>
