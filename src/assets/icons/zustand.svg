<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background -->
  <circle cx="32" cy="32" r="30" fill="#7B5EA7" opacity="0.12"/>

  <!-- Zustand bear face — the official mascot -->
  <!-- Head -->
  <circle cx="32" cy="33" r="17" fill="#7B5EA7" opacity="0.9"/>

  <!-- Ears -->
  <circle cx="19" cy="19" r="6" fill="#7B5EA7" opacity="0.9"/>
  <circle cx="45" cy="19" r="6" fill="#7B5EA7" opacity="0.9"/>
  <circle cx="19" cy="19" r="3.5" fill="#A07CC5"/>
  <circle cx="45" cy="19" r="3.5" fill="#A07CC5"/>

  <!-- Face highlight -->
  <circle cx="32" cy="35" r="11" fill="#A07CC5" opacity="0.55"/>

  <!-- Eyes -->
  <circle cx="26" cy="30" r="3" fill="white"/>
  <circle cx="38" cy="30" r="3" fill="white"/>
  <circle cx="27" cy="30" r="1.5" fill="#2d1b4e"/>
  <circle cx="39" cy="30" r="1.5" fill="#2d1b4e"/>

  <!-- Nose -->
  <ellipse cx="32" cy="37" rx="3" ry="2" fill="#2d1b4e" opacity="0.8"/>

  <!-- Mouth -->
  <path d="M28 40 Q32 44 36 40" stroke="#2d1b4e" stroke-width="1.8" fill="none" stroke-linecap="round"/>
</svg>
