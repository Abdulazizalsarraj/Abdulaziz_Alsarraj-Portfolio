<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="rn-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#61DAFB"/>
      <stop offset="100%" stop-color="#0099cc"/>
    </linearGradient>
  </defs>
  <!-- Three orbiting ellipses like React logo -->
  <!-- Ellipse 1 - horizontal -->
  <ellipse cx="32" cy="32" rx="28" ry="10" stroke="url(#rn-grad)" stroke-width="3" fill="none"/>
  <!-- Ellipse 2 - rotated 60deg -->
  <ellipse cx="32" cy="32" rx="28" ry="10" stroke="url(#rn-grad)" stroke-width="3" fill="none"
           transform="rotate(60 32 32)"/>
  <!-- Ellipse 3 - rotated 120deg -->
  <ellipse cx="32" cy="32" rx="28" ry="10" stroke="url(#rn-grad)" stroke-width="3" fill="none"
           transform="rotate(120 32 32)"/>
  <!-- Center nucleus -->
  <circle cx="32" cy="32" r="5" fill="#61DAFB"/>
  <!-- Mobile badge to differentiate from React -->
  <rect x="24" y="44" width="16" height="12" rx="3" fill="#0099cc" opacity="0.85"/>
  <rect x="27" y="46" width="10" height="6" rx="1.5" fill="white" opacity="0.9"/>
</svg>
